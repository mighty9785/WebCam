<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Manager • Groups</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="page-shell">
    <section class="expense-card">
      <div class="expense-header">
        <div>
          <h1 class="expense-title">Groups</h1>
          <p class="expense-subtitle">Create and manage your shared expense groups.</p>
        </div>
        <div class="action-row">
          <a href="dashboard.html"><button class="secondary">Dashboard</button></a>
          <a href="expenses.html"><button class="secondary">Expenses</button></a>
          <a href="settlements.html"><button class="secondary">Settlements</button></a>
          <button id="logout-button" class="secondary">Logout</button>
        </div>
      </div>
      <section class="expense-card" style="margin-bottom:24px;">
        <h2 class="expense-title">Add a new group</h2>
        <form id="group-form" class="expense-form">
          <label for="group-name">Group name</label>
          <input id="group-name" type="text" required placeholder="Roommates, Trip Crew, Split Club">

          <div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <label>Choose members</label>
              <span id="selected-count" class="expense-chip">0 selected</span>
            </div>
            <div id="available-users" class="available-user-grid"></div>
            <div id="selected-members" class="selected-user-list"></div>
          </div>

          <button type="submit" class="primary" style="width:100%; margin-top:20px;">Create group</button>
        </form>
      </section>
      <section class="expense-card">
        <h2 class="expense-title">Your groups</h2>
        <div id="group-list"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/expense-app.js"></script>
  <script>
    (function () {
      initSupabaseClient();
      const user = requireExpenseAuth();
      if (!user) return;

      document.getElementById('logout-button').addEventListener('click', logoutExpense);

    const groupForm = document.getElementById('group-form');
    const selectedMembers = new Set();
    const availableUsersContainer = document.getElementById('available-users');
    const selectedMembersContainer = document.getElementById('selected-members');
    const selectedCountLabel = document.getElementById('selected-count');

    function updateSelectedCount() {
      selectedCountLabel.textContent = `${selectedMembers.size} selected`;
    }

    function renderSelectedMembers() {
      if (!selectedMembers.size) {
        selectedMembersContainer.innerHTML = '<div class="expense-subtitle">Tap a user above to add them to the group.</div>';
        return;
      }
      selectedMembersContainer.innerHTML = Array.from(selectedMembers).map((email) => `
        <span class="member-chip">
          ${email}
          <button type="button" data-email="${email}" class="remove-member" aria-label="Remove ${email}">×</button>
        </span>
      `).join('');
      selectedMembersContainer.querySelectorAll('.remove-member').forEach((button) => {
        button.addEventListener('click', () => {
          selectedMembers.delete(button.dataset.email);
          renderSelectedMembers();
          updateAvailableUsers();
          updateSelectedCount();
        });
      });
    }

    function updateAvailableUsers() {
      const available = getAvailableGroupMembers(user.email);
      if (!available.length) {
        availableUsersContainer.innerHTML = '<div class="expense-subtitle">No other registered users available. Ask friends to sign up first.</div>';
        return;
      }

      availableUsersContainer.innerHTML = available.map((email) => {
        const active = selectedMembers.has(email) ? 'selected' : '';
        return `
          <button type="button" class="available-user ${active}" data-email="${email}">${email}</button>
        `;
      }).join('');

      availableUsersContainer.querySelectorAll('.available-user').forEach((button) => {
        button.addEventListener('click', () => {
          const email = button.dataset.email;
          if (selectedMembers.has(email)) {
            selectedMembers.delete(email);
          } else {
            selectedMembers.add(email);
          }
          renderSelectedMembers();
          updateAvailableUsers();
          updateSelectedCount();
        });
      });
    }

    groupForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const name = document.getElementById('group-name').value.trim();
      const members = Array.from(selectedMembers);

      if (!name) {
        alert('Enter a name for the group.');
        return;
      }

      createExpenseGroup(user, name, members);
      document.getElementById('group-name').value = '';
      selectedMembers.clear();
      updateSelectedCount();
      renderSelectedMembers();
      updateAvailableUsers();
      renderGroups();
    });

    function renderGroups() {
      const groups = getUserGroups(user);
      const list = document.getElementById('group-list');

      if (!groups.length) {
        list.innerHTML = '<p class="expense-subtitle">No groups created yet. Fill in the form above to add your first shared group.</p>';
        return;
      }

      list.innerHTML = groups.map((group) => {
        const totals = computeGroupTotals(group.id);
        return `
          <div class="expense-card" style="margin-bottom:16px;">
            <div class="expense-header">
              <div>
                <h3 class="expense-title">${group.name}</h3>
                <p class="expense-subtitle">${group.members.length} members</p>
              </div>
              <a class="expense-tab" href="expenses.html?groupId=${group.id}">View expenses</a>
            </div>
            <div class="expense-grid" style="grid-template-columns:repeat(3,minmax(100px,1fr));">
              <div><strong>${totals.count}</strong><div class="expense-chip">Expenses</div></div>
              <div><strong>${formatExpenseAmount(totals.total)}</strong><div class="expense-chip">Total spent</div></div>
              <div><strong>${group.members.join(', ')}</strong><div class="expense-chip">Members</div></div>
            </div>
          </div>
        `;
      }).join('');
    }

    renderGroups();
    })();
  </script>
</body>
</html>
