<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcame | Chat</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contacts { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 12px; }
    .contact { padding: 10px; border-radius: 10px; cursor: pointer; }
    .contact:hover { background: rgba(255,255,255,0.03); }
  </style>
</head>
<body>
  <main class="page-shell">
    <header class="card">
      <h1>Live Chat</h1>
      <p>Shared chat for all connected devices — messages expire after 30 minutes.</p>
    </header>

    <section class="card chat-shell app-shell">
      <aside class="sidebar">
        <div class="nav-icon active" title="Broadcast" data-target="camera.html">📷</div>
        <div class="nav-icon" title="Chat" data-target="chat.html">💬</div>
        <div class="nav-icon" title="Viewer" data-target="viewer.html">🖥️</div>
        <div style="flex:1"></div>
        <div class="nav-icon" title="Settings">⚙️</div>
      </aside>

      <div class="chat-list">
        <div class="chat-search">
          <input id="searchInput" placeholder="Search or start new chat" />
        </div>
        <div class="chat-items" id="chatItems"></div>
      </div>

      <div class="chat-window">
        <div class="chat-header" style="border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:10px">
            <img src="https://i.pravatar.cc/40?img=5" style="width:40px;height:40px;border-radius:999px;" />
            <div>
              <div style="font-weight:700">General Chat</div>
              <div style="font-size:0.86rem;color:var(--muted)">Online</div>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="icon">🔍</button>
            <button class="icon">⋯</button>
          </div>
        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <div class="chat-input-area">
          <input id="chatText" class="chat-input" type="text" placeholder="Write a message" />
          <label class="chat-file-label">
            <input id="chatFile" type="file" accept="image/*" />📎
          </label>
          <button id="chatSend" class="chat-send primary">➤</button>
        </div>
      </div>
    </section>

    <footer>
      Chat powered by WebSocket (no database). Images are base64-encoded.
    </footer>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
